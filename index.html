<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUYABUYA</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Shell-specific layout: the iframe fills the viewport beneath the
       fixed player bar. The player bar itself reuses the same #site-player
       styling already defined in style.css, just positioned once here
       instead of being rebuilt by JS on every page. */
    html, body {
      height: 100%;
      overflow: hidden; /* the SITE scrolls inside its own iframe, not the shell */
    }
    #site-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <iframe id="site-frame" src="index.html" title="MUYABUYA site content"></iframe>

  <div id="site-player" class="sketch-border">
    <div class="content player-content">
      <button class="player-btn btn-prev" title="Previous" aria-label="Previous track">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="player-btn btn-play" title="Play" aria-label="Play">
        <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
      </button>
      <button class="player-btn btn-next" title="Next" aria-label="Next track">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zm-2 6L5.5 6v12z"/></svg>
      </button>
      <div class="player-track" id="player-track-label">tap play to start</div>
    </div>
  </div>

  <script src="js/sketch-borders.js"></script>
  <script src="js/shell-player.js"></script>
</body>
</html>
