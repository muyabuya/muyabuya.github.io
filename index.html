<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUYABUYA</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Shell-specific layout: the iframe fills the viewport beneath the
       fixed player bar. The player bar itself reuses the same #site-player
       styling already defined in style.css, just positioned once here
       instead of being rebuilt by JS on every page. */
    html, body {
      height: 100%;
      overflow: hidden; /* the SITE scrolls inside its own iframe, not the shell */
    }
    #site-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <iframe id="site-frame" src="index.html" title="MUYABUYA site content"></iframe>

  <div id="site-player" class="sketch-border">
    <div class="content player-content">
      <button class="player-btn btn-prev" title="Previous" aria-label="Previous track">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="player-btn btn-play" title="Play" aria-label="Play">
        <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
      </button>
      <button class="player-btn btn-next" title="Next" aria-label="Next track">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zm-2 6L5.5 6v12z"/></svg>
      </button>
      <div class="player-track" id="player-track-label">tap play to start</div>
    </div>
  </div>
   <nav class="site-nav sketch-border">
    <a href="index.html" class="nav-link active">Home</a>
    <a href="portfolio/index.html" class="nav-link">Gallery</a>
    <a href="stone-heart/index.html" class="nav-link">STONE:HEART</a>
    <a href="about.html" class="nav-link">About</a>
  </nav>

  <div class="hero-wrap">
    <div class="hero-card sketch-border">
      <div class="content">
        <h1>MUYABUYA</h1>
        <p class="tagline">art &middot; comics &middot; music</p>
      </div>
    </div>
  </div>

  <div class="tiles">

    <a href="portfolio/index.html" class="tile">
      <div class="tile-box sketch-border">
        <div class="content">
          <svg class="tile-icon" viewBox="0 0 100 100" fill="none" stroke="var(--ink)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
            <rect x="15" y="15" width="70" height="70" rx="4"/>
            <path d="M15 65 L35 45 L50 58 L70 38 L85 55 L85 85 L15 85 Z" opacity="0.6"/>
            <circle cx="32" cy="32" r="6"/>
          </svg>
        </div>
      </div>
      <div class="tile-eyebrow">Portfolio</div>
      <div class="tile-label">Art</div>
    </a>

    <a href="stone-heart/index.html" class="tile">
      <div class="tile-box sketch-border">
        <div class="content">
          <svg class="tile-icon" viewBox="0 0 100 100" fill="none" stroke="var(--ink)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M50 85 C20 65 10 45 10 30 C10 15 25 8 38 15 C44 18 48 24 50 30 C52 24 56 18 62 15 C75 8 90 15 90 30 C90 45 80 65 50 85 Z"/>
            <path d="M50 30 L44 45 L54 50 L46 68" opacity="0.7"/>
          </svg>
        </div>
      </div>
      <div class="tile-eyebrow">STONE:HEART</div>
      <div class="tile-label">Webcomic</div>
    </a>

    <a href="music/index.html" class="tile">
      <div class="tile-box sketch-border">
        <div class="content">
          <svg class="tile-icon" viewBox="0 0 100 100" fill="none" stroke="var(--ink)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M35 70 L35 25 L75 15 L75 60" />
            <circle cx="28" cy="72" r="11" fill="var(--ink)" stroke="none"/>
            <circle cx="68" cy="62" r="11" fill="var(--ink)" stroke="none"/>
          </svg>
        </div>
      </div>
      <div class="tile-eyebrow">Sound</div>
      <div class="tile-label">Music</div>
    </a>

  </div>

  <footer>
    <p>Copyright MUYABUYA Studios&copy;, 2026 (not really i just thought this would look cool)</p>
  </footer>

  <script src="js/sketch-borders.js"></script>
</body>

  <script src="js/sketch-borders.js"></script>
  <script src="js/shell-player.js"></script>
</body>
</html>
